<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <link rel="apple-touch-icon" href="https://img.icons8.com/fluency/300/fox.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-startup-image" href="https://img.icons8.com/fluency/600/fox.png">

    <title>HTMLingo | AI Edition</title>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        @keyframes wiggle { 0%, 100% { transform: rotate(-3deg); } 50% { transform: rotate(3deg); } }
        .animate-wiggle { animation: wiggle 3s ease-in-out infinite; }
        body { -webkit-tap-highlight-color: transparent; overscroll-behavior: none; }
        .btn-press:active { transform: scale(0.95); }
    </style>
</head>
<body class="bg-slate-50 font-sans text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- ВСТАВЬ СВОЙ КЛЮЧ ТУТ ---
        const GEMINI_API_KEY = 'ВСТАВЬ_СЮДА_КЛЮЧ'; 

        const Foxie = () => (
            <div className="w-32 h-32 mx-auto animate-wiggle">
                <img src="https://img.icons8.com/fluency/200/fox.png" alt="Лис" />
            </div>
        );

        const App = () => {
            const [view, setView] = useState('login');
            const [user, setUser] = useState({ id: '', xp: 0, level: 1 });
            const [currentLesson, setCurrentLesson] = useState(null);
            const [aiContent, setAiContent] = useState('');
            const [loading, setLoading] = useState(false);

            useEffect(() => {
                const saved = localStorage.getItem('htmlingo_data');
                if (saved) { setUser(JSON.parse(saved)); setView('home'); }
            }, []);

            const save = (data) => {
                setUser(data);
                localStorage.setItem('htmlingo_data', JSON.stringify(data));
            };

            const generateAIContent = async (topic) => {
                setLoading(true);
                setAiContent('');
                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent?key=${GEMINI_API_KEY}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: `Ты учитель HTML. Напиши очень короткий и понятный урок для 6 класса на тему: ${topic}. Используй сленг, смайлики и в конце добавь пример кода.` }] }]
                        })
                    });
                    const data = await response.json();
                    setAiContent(data.candidates[0].content.parts[0].text);
                } catch (e) {
                    setAiContent("Ошибка! Проверь API ключ в коде. 🛑");
                }
                setLoading(false);
            };

            const openLesson = (lesson) => {
                setCurrentLesson(lesson);
                generateAIContent(lesson.title);
            };

            const completeLesson = () => {
                let newXp = user.xp + currentLesson.xp;
                let newLevel = user.level;
                if (newXp >= 100) { newLevel++; newXp = 0; }
                save({ ...user, xp: newXp, level: newLevel });
                setCurrentLesson(null);
            };

            if (view === 'login') return (
                <div className="min-h-screen flex flex-col items-center justify-center p-10 bg-orange-50 text-center">
                    <Foxie />
                    <h1 className="text-5xl font-black text-orange-600 mb-8 mt-4">HTMLingo</h1>
                    <input 
                        type="text" placeholder="ТВОЙ ID..." 
                        className="w-full max-w-xs p-5 rounded-3xl mb-4 border-none shadow-lg text-center font-bold"
                        onChange={(e) => setUser({...user, id: e.target.value.toUpperCase()})}
                    />
                    <button onClick={() => {if(user.id) {setView('home'); save(user);}}} className="bg-orange-500 text-white px-10 py-5 rounded-3xl font-black shadow-xl btn-press">ВХОД 🚀</button>
                </div>
            );

            return (
                <div className="min-h-screen p-6 max-w-md mx-auto">
                    <div className="flex justify-between items-center mb-10 bg-white p-4 rounded-3xl shadow-sm">
                        <div className="font-black">🦊 {user.id}</div>
                        <div className="flex gap-2">
                            <span className="bg-orange-500 text-white px-3 py-1 rounded-full text-xs font-bold">LVL {user.level}</span>
                            <span className="bg-yellow-400 text-white px-3 py-1 rounded-full text-xs font-bold">XP {user.xp}/100</span>
                        </div>
                    </div>

                    <h2 className="text-2xl font-black mb-6 text-slate-400 uppercase tracking-tighter">Твои темы:</h2>
                    
                    {[
                        { title: "Заголовки <h1>", xp: 20, icon: "🔥" },
                        { title: "Списки <ul>", xp: 35, icon: "📜" },
                        { title: "Ссылки <a>", xp: 50, icon: "🔗" }
                    ].map((l, i) => (
                        <div key={i} onClick={() => openLesson(l)} className="bg-white p-6 rounded-[2rem] mb-4 shadow-md flex items-center gap-4 cursor-pointer btn-press border-b-4 border-slate-100">
                            <div className="text-3xl">{l.icon}</div>
                            <div className="flex-1 font-black text-lg">{l.title}</div>
                            <div className="text-orange-500 font-bold">+{l.xp}XP</div>
                        </div>
                    ))}

                    {currentLesson && (
                        <div className="fixed inset-0 bg-white z-50 p-8 overflow-y-auto">
                            <div className="flex justify-between mb-8">
                                <button onClick={() => setCurrentLesson(null)} className="text-slate-400 font-bold underline">Назад</button>
                                <div className="text-3xl">{currentLesson.icon}</div>
                            </div>
                            <h2 className="text-4xl font-black mb-6">{currentLesson.title}</h2>
                            {loading ? (
                                <div className="text-center py-20 animate-bounce text-4xl">🦊 Соображаю...</div>
                            ) : (
                                <div className="bg-slate-100 p-6 rounded-[2rem] text-lg leading-relaxed whitespace-pre-wrap font-medium">
                                    {aiContent}
                                </div>
                            )}
                            {!loading && (
                                <button onClick={completeLesson} className="w-full mt-8 bg-orange-500 text-white py-6 rounded-3xl font-black text-xl shadow-2xl btn-press">
                                    ПОНЯЛ! +{currentLesson.xp}XP 🏆
                                </button>
                            )}
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
