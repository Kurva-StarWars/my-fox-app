<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>HTMLingo | Учись кодить</title>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        @keyframes wiggle { 0%, 100% { transform: rotate(-5deg); } 50% { transform: rotate(10deg); } }
        .animate-wiggle { animation: wiggle 3s ease-in-out infinite; }
        @keyframes blink { 0%, 90%, 100% { transform: scaleY(1); } 95% { transform: scaleY(0); } }
        .animate-blink { animation: blink 4s infinite; }
        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #FB923C; border-radius: 10px; }
        body { -webkit-tap-highlight-color: transparent; overscroll-behavior: none; }
    </style>
</head>
<body class="bg-orange-50 custom-scroll">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- Иконки (Замена Lucide на Emoji для стабильности) ---
        const Icons = {
            Flame: () => <span>🔥</span>,
            Star: () => <span>⭐</span>,
            Book: () => <span>📖</span>,
            User: () => <span>👤</span>,
            Settings: () => <span>⚙️</span>,
            Check: () => <span>✅</span>,
            Lock: () => <span>🔒</span>,
            Camera: () => <span>📷</span>,
            Code: () => <span>💻</span>
        };

        const FoxieAvatar = ({ mood = 'happy', className = "w-32 h-32" }) => (
            <div className={`relative ${className} transition-all duration-500`}>
                <svg viewBox="0 0 100 100" className="w-full h-full drop-shadow-2xl overflow-visible">
                    <path d="M75 75 C95 70 105 45 85 35 C70 28 65 45 75 60" fill="#F97316" className="animate-wiggle origin-bottom-left" />
                    <circle cx="50" cy="75" r="22" fill="#FB923C" />
                    <g>
                        <path d="M30 40 L45 20 L55 40 Z" fill="#EA580C" /> 
                        <path d="M70 40 L55 20 L45 40 Z" fill="#EA580C" />
                    </g>
                    <path d="M25 50 C25 30 75 30 75 50 C75 72 50 82 25 50" fill="#FB923C" />
                    <path d="M25 50 C35 60 50 63 75 50 C65 70 50 72 25 50" fill="white" />
                    <circle cx="42" cy="48" r="3" fill="#1E293B" className="animate-blink" />
                    <circle cx="58" cy="48" r="3" fill="#1E293B" className="animate-blink" />
                    <circle cx="50" cy="54" r="2.5" fill="#000" />
                </svg>
            </div>
        );

        const App = () => {
            const [view, setView] = useState('login');
            const [customId, setCustomId] = useState('');
            const [xp, setXp] = useState(0);
            const [completed, setCompleted] = useState([]);

            const curriculum = [
                { id: 1, title: 'Твой первый тег', topic: 'Заголовки h1' },
                { id: 2, title: 'Абзацы и текст', topic: 'Теги p и br' },
                { id: 3, title: 'Списки дел', topic: 'ul и li' }
            ];

            if (view === 'login') {
                return (
                    <div className="min-h-screen flex flex-col items-center justify-center p-8 text-center bg-orange-50">
                        <FoxieAvatar className="w-48 h-48 mb-6" />
                        <h1 className="text-6xl font-black text-orange-600 mb-2 tracking-tighter">HTMLingo</h1>
                        <p className="text-slate-500 mb-10 font-bold uppercase tracking-widest text-xs">Level Up Your Code</p>
                        <div className="w-full max-w-sm bg-white p-8 rounded-[3rem] shadow-2xl border-b-8 border-orange-100">
                            <input 
                                type="text" 
                                placeholder="ТВОЙ ID..." 
                                value={customId}
                                onChange={(e) => setCustomId(e.target.value.toUpperCase())}
                                class="w-full bg-slate-50 p-5 rounded-3xl mb-6 border-2 border-slate-100 outline-none font-black text-2xl text-center text-slate-700"
                            />
                            <button onClick={() => setView('home')} class="w-full py-6 bg-orange-500 text-white rounded-3xl font-black text-xl shadow-xl shadow-orange-200 active:scale-95 transition-all">
                                ПОГНАЛИ 🚀
                            </button>
                        </div>
                    </div>
                );
            }

            return (
                <div class="min-h-screen bg-slate-50 flex flex-col md:flex-row overflow-hidden">
                    {/* Sidebar */}
                    <nav class="w-full md:w-24 lg:w-64 bg-white border-r p-6 flex md:flex-col items-center gap-6 z-50 shadow-xl">
                        <button onClick={() => setView('home')} class={`p-4 rounded-2xl ${view === 'home' ? 'bg-orange-500 text-white' : 'text-slate-400'}`}>🏠</button>
                        <button onClick={() => setView('profile')} class={`p-4 rounded-2xl ${view === 'profile' ? 'bg-orange-500 text-white' : 'text-slate-400'}`}>👤</button>
                    </nav>

                    {/* Main */}
                    <main class="flex-1 h-screen overflow-y-auto p-4 md:p-10 custom-scroll">
                        <header class="max-w-5xl mx-auto flex items-center justify-between mb-10 bg-white p-6 rounded-[2.5rem] shadow-sm border border-slate-100">
                            <div class="flex gap-8">
                                <div class="flex items-center gap-2"><Icons.Flame /> <span class="font-black text-2xl">3</span></div>
                                <div class="flex items-center gap-2"><Icons.Star /> <span class="font-black text-2xl text-yellow-500">{xp}</span></div>
                            </div>
                            <div class="bg-orange-100 px-6 py-2 rounded-full font-black text-orange-700 text-sm">LVL 1</div>
                        </header>

                        <div class="max-w-5xl mx-auto">
                            {view === 'home' && (
                                <div class="space-y-8 animate-in slide-in-from-bottom-4 duration-500">
                                    <div class="bg-slate-900 rounded-[3rem] p-10 text-white flex items-center justify-between shadow-2xl overflow-hidden relative">
                                        <div class="z-10">
                                            <h2 class="text-4xl font-black mb-4 uppercase italic">Здарова, {customId}!</h2>
                                            <p class="text-slate-400 font-bold mb-6 text-lg">Готов качнуть скиллы?</p>
                                            <button class="bg-orange-500 px-8 py-4 rounded-2xl font-black text-xl hover:scale-105 transition-all shadow-lg shadow-orange-500/40">УЧИТЬСЯ</button>
                                        </div>
                                        <FoxieAvatar className="w-32 h-32 opacity-80" />
                                    </div>

                                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                                        {curriculum.map(lesson => (
                                            <div key={lesson.id} onClick={() => setXp(xp + 10)} class="bg-white p-8 rounded-[2.5rem] border-b-8 border-slate-200 hover:border-orange-500 transition-all cursor-pointer group">
                                                <div class="text-4xl mb-4 group-hover:scale-110 transition-transform">📚</div>
                                                <h4 class="font-black text-xl mb-1">{lesson.title}</h4>
                                                <p class="text-xs font-bold text-slate-400 uppercase">{lesson.topic}</p>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}

                            {view === 'profile' && (
                                <div class="max-w-md mx-auto bg-white p-12 rounded-[4rem] text-center shadow-2xl border-b-[12px] border-slate-200">
                                    <div class="w-40 h-40 bg-orange-100 rounded-[3rem] mx-auto mb-8 flex items-center justify-center">
                                        <FoxieAvatar />
                                    </div>
                                    <h2 class="text-4xl font-black text-slate-800 mb-2">{customId}</h2>
                                    <p class="text-orange-500 font-black mb-10 tracking-widest text-xs uppercase">HTML WARRIOR</p>
                                    <div class="grid grid-cols-2 gap-4">
                                        <div class="bg-slate-50 p-6 rounded-3xl"><p class="font-black text-2xl">{xp}</p><p class="text-[10px] text-slate-400 font-bold">XP</p></div>
                                        <div class="bg-slate-50 p-6 rounded-3xl"><p class="font-black text-2xl">1</p><p class="text-[10px] text-slate-400 font-bold">LVL</p></div>
                                    </div>
                                </div>
                            )}
                        </div>
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
